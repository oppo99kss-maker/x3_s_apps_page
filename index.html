<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيقات الشاشة الذكية | ﮼عبوود 𖤍</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <header class="hero">
        <div class="hero-content">
            <div class="logo-container">
                <i class="fa-brands fa-playstation logo-icon"></i>
            </div>
            <h1 class="account-name" dir="rtl">عبوود</h1>
            <p class="account-handle" dir="ltr">
                <a href="https://www.tiktok.com/@x3_s" target="_blank">
                    <i class="fa-brands fa-tiktok"></i> @x3_s
                </a>
            </p>
            <p class="hero-description">أفضل التطبيقات المجانية للشاشات الذكية، روابط تحميل مباشرة وبدون إعلانات مزعجة.</p>
            <div class="search-container">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="ابحث عن تطبيق...">
            </div>
            <div class="category-nav" id="categoryNav">
                <button class="cat-btn active" data-cat="all"><i class="fa-solid fa-border-all"></i> الكل</button>
                <button class="cat-btn" data-cat="channels"><i class="fa-solid fa-satellite-dish"></i> قنوات بث مباشر</button>
                <button class="cat-btn" data-cat="movies"><i class="fa-solid fa-film"></i> أفلام ومسلسلات</button>
                <button class="cat-btn" data-cat="anime"><i class="fa-solid fa-dragon"></i> أنمي</button>
                <button class="cat-btn" data-cat="iptv"><i class="fa-solid fa-tower-broadcast"></i> مشغلات IPTV</button>
                <button class="cat-btn" data-cat="social"><i class="fa-solid fa-share-nodes"></i> سوشل ميديا</button>
                <button class="cat-btn" data-cat="tools"><i class="fa-solid fa-wrench"></i> أدوات الشاشة</button>
                <button class="cat-btn" data-cat="stores"><i class="fa-solid fa-store"></i> متاجر بديلة</button>
            </div>
        </div>
    </header>

    <main class="container" id="appsContainer"></main>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2024 - ﮼عبوود 𖤍</p>
        <p class="disclaimer">ملاحظة: جميع الروابط توفر تحميل مباشر وآمن.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
